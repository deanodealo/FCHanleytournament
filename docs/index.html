<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FC Hanley 5aSide Tournament</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <img src="images/fun5.jpg" alt="" class="bg-overlay" />

  <header>
    <div class="banner-images">
      <img src="images/festival image.png" alt="FC Hanley Logo" class="logo">
    </div>
  </header>

  <!-- Controls bar — selects ONLY -->
  <div class="public-controls">
    <p class="controls-title">Select below to view your fixtures and results</p>

    <div class="controls-row">
      <div class="control-item">
        <label for="day-select">Day</label>
        <select id="day-select">
          <option value="day1">Saturday</option>
          <option value="day2">Sunday</option>
        </select>
      </div>

      <div class="control-item">
        <label for="session-select">Session</label>
        <select id="session-select">
          <option value="am">AM</option>
          <option value="pm">PM</option>
        </select>
      </div>

      <div class="control-item">
        <label for="age-group-select">Age Group</label>
        <select id="age-group-select">
          <option value="U7">U7</option>
          <option value="U8">U8</option>
          <option value="U9">U9</option>
          <option value="U10">U10</option>
          <option value="U11">U11</option>
          <option value="U12">U12</option>
          <option value="U13">U13</option>
        </select>
      </div>

      <div class="control-item">
        <label for="group-select">Group</label>
        <select id="group-select">
          <!--<option value="all">All / Single Group</option>-->
          <option value="Group A">Group A</option>
          <option value="Group B">Group B</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Main content — OUTSIDE the controls bar -->
  <div class="main-content mobile-tournament-layout">

    <section class="card league-table">
      <h2 id="age-group-header">League Table</h2>
      <table id="table">
        <thead>
          <tr>
            <th>Team</th>
            <th>P</th>
            <th>W</th>
            <th>D</th>
            <th>L</th>
            <th>GD</th>
            <th>PTS</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="card fixtures-results">
      <h2>Fixtures</h2>
      <ul id="fixtures-list"></ul>
    </section>

    <section class="card fixtures-results">
      <h2>Results</h2>
      <ul id="results-list"></ul>
    </section>

    <section class="card fixtures-results knockout-card">
      <h2>Knockout Stages</h2>
      <div id="knockout-display">
        Semi-finals and final will appear here once group games are complete.
      </div>
    </section>

  </div>


<footer>
Proudly raising funds for the Douglas Macmillan Cancer Support Charity <br>
  <img src="images/dugmac.png" alt="DougieMac" style="height: 50px; margin-top: 10px; background: white; border-radius: 6px; padding: 4px 10px;">
</footer>

  <script type="module" src="homepage.js"></script>
</body>
</html>
